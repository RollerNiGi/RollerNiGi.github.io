<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Support | 技术支持</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 gradient-bg">

    <div class="glass-effect rounded-2xl shadow-2xl p-8 max-w-md w-full text-center fade-in">
        
        <!-- Language Selector -->
        <div class="absolute top-4 right-4">
            <select id="languageSelect" onchange="changeLanguage()" class="bg-white border border-gray-300 text-gray-700 py-1 px-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                <option value="en">English</option>
                <option value="zh">中文 (简体)</option>
                <option value="ja">日本語</option>
                <option value="es">Español</option>
            </select>
        </div>

        <!-- Icon -->
        <div class="mb-6 flex justify-center">
            <div class="bg-purple-100 p-4 rounded-full">
                <svg class="w-12 h-12 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
            </div>
        </div>

        <!-- Content -->
        <h1 id="title" class="text-3xl font-bold text-gray-800 mb-2">Technical Support</h1>
        <p id="subtitle" class="text-gray-600 mb-8">We're here to help! If you have any questions or issues, please reach out to our support team.</p>

        <div class="bg-gray-50 rounded-xl p-6 border border-gray-100 mb-8">
            <p id="contactLabel" class="text-sm text-gray-500 uppercase tracking-wide font-semibold mb-2">Support Email</p>
            <div class="flex items-center justify-center space-x-2">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                <span class="text-lg font-medium text-gray-800 select-all">sunnyxblss@outlook.com</span>
            </div>
        </div>

        <a href="mailto:sunnyxblss@outlook.com" id="emailBtn" class="block w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-xl transition duration-300 transform hover:scale-105 shadow-lg flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
            </svg>
            Send Email
        </a>

        <div class="mt-8 text-xs text-gray-400">
            <span id="footerText">&copy; 2026 xuning. All rights reserved.</span>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "Technical Support",
                subtitle: "We're here to help! If you have any questions or issues, please reach out to our support team.",
                contactLabel: "Support Email",
                emailBtn: "Send Email",
                footerText: "&copy; 2026 xuning. All rights reserved."
            },
            zh: {
                title: "技术支持中心",
                subtitle: "我们要为您提供帮助！如果您有任何问题或遇到困难，请随时联系我们的支持团队。",
                contactLabel: "支持邮箱",
                emailBtn: "发送邮件",
                footerText: "&copy; 2026 xuning。保留所有权利。"
            },
            ja: {
                title: "テクニカルサポート",
                subtitle: "お手伝いします！ご質問や問題がございましたら、サポートチームまでご連絡ください。",
                contactLabel: "サポートメール",
                emailBtn: "メールを送る",
                footerText: "&copy; 2026 xuning。無断転載を禁じます。"
            },
            es: {
                title: "Soporte Técnico",
                subtitle: "¡Estamos aquí para ayudar! Si tiene alguna pregunta o problema, comuníquese con nuestro equipo de soporte.",
                contactLabel: "Correo de Soporte",
                emailBtn: "Enviar Correo",
                footerText: "&copy; 2026 xuning. Todos los derechos reservados."
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('languageSelect').value;
            const content = translations[lang];

            document.getElementById('title').textContent = content.title;
            document.getElementById('subtitle').textContent = content.subtitle;
            document.getElementById('contactLabel').textContent = content.contactLabel;
            
            // Update button text but keep the icon
            const btn = document.getElementById('emailBtn');
            const icon = btn.querySelector('svg').outerHTML;
            btn.innerHTML = icon + ' ' + content.emailBtn;
            
            document.getElementById('footerText').innerHTML = content.footerText;
            
            // Update html lang attribute
            document.documentElement.lang = lang;
        }

        // Initialize with browser language if available and supported, otherwise default to English
        document.addEventListener('DOMContentLoaded', () => {
            const browserLang = navigator.language.slice(0, 2);
            const supportedLangs = Object.keys(translations);
            if (supportedLangs.includes(browserLang)) {
                document.getElementById('languageSelect').value = browserLang;
                changeLanguage();
            }
        });
    </script>
</body>
</html>
